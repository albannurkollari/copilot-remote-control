pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
      priority: 1
    lint:
      run: pnpm lint
      priority: 2
    format:
      priority: 3
      run: |
        pnpm fmt
        git diff --quiet
      fail_text: 'Code is not formatted! Stage and commit the changes.'
