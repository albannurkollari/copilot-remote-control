name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    outputs:
      release_version: ${{ steps.release_version.outputs.release_version }}
      released: ${{ steps.semantic_release.outputs.released }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Typecheck and build
        run: pnpm typecheck && pnpm build

      - name: Run semantic-release
        id: semantic_release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          pnpm release | tee semantic-release.log

          if grep -Eq 'Published release [0-9]' semantic-release.log; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release version
        id: release_version
        if: ${{ steps.semantic_release.outputs.released == 'true' }}
        shell: bash
        run: |
          tag="$(git describe --tags --abbrev=0)"
          echo "release_version=${tag#v}" >> "$GITHUB_OUTPUT"

  vscode-marketplace:
    needs: npm-publish
    if: ${{ needs.npm-publish.result == 'success' && needs.npm-publish.outputs.released == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Publish VS Code extension
        env:
          RELEASE_VERSION: ${{ needs.npm-publish.outputs.release_version }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm publish:extension
